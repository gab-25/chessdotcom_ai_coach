services:

  web:
    build: .
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - REDIS_URL=redis://redis:6379/0
      - STOCKFISH_PATH=stockfish
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - REDIS_URL=redis://redis:6379/0
      - STOCKFISH_PATH=stockfish
    command: celery -A chessdotcom_ai_coach worker -l info
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_KEEP_ALIVE=30s
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  ollama-data:
