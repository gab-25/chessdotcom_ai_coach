services:
  chessdotcom-ai-coach:
    build: .
    env_file:
      - .env
    environment:
      # Override host names to match the compose network.
      - POSTGRES_HOST=postgres
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  worker:
    # Celery worker: executes auto-analysis tasks.
    build: .
    command: celery -A chessdotcom_ai_coach worker --loglevel=info
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      redis:
        condition: service_started

  beat:
    # Celery Beat: schedules periodic auto-analysis tasks.
    build: .
    command: celery -A chessdotcom_ai_coach beat --loglevel=info
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    environment:
      # Unload the model from RAM ~30s after the last request so it does not sit
      # resident while idle (mirrors the Kubernetes deployment).
      - OLLAMA_KEEP_ALIVE=30s
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  ollama-data:
