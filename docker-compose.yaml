services:
  chessdotcom-ai-coach:
    build: .
    env_file:
      - .env
    environment:
      # Override host names to match the compose network.
      - POSTGRES_HOST=postgres
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - CHESS_ENGINE_HOST=chess-engine
      - CHESS_ENGINE_PORT=3333
    ports:
      - "8000:8000"
    depends_on:
      chess-engine:
        condition: service_started
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  chess-engine:
    build:
      context: chess_engine
    ports:
      - "3333:3333"

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  ollama-data:
