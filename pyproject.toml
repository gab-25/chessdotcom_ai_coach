[project]
name = "chessdotcom-ai-coach"
version = "0.3.0"
description = ""
authors = [
    {name = "gab-25",email = "gabrielesorci.25@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "chess-com (>=3.13.0,<4.0.0)",
    "chess (>=1.10.0,<2.0.0)",
    "fastapi[standard] (>=0.135.1,<0.136.0)",
    "python-dotenv (>=1.2.2,<2.0.0)",
    "sqlmodel (>=0.0.37,<0.0.38)",
    "alembic (>=1.18.4,<2.0.0)",
    "psycopg2-binary (>=2.9.11,<3.0.0)",
    "httpx (>=0.28.1,<0.29.0)",
    "authlib (>=1.6.9,<2.0.0)",
    "onnxruntime (>=1.24.4,<2.0.0)",
    "ollama (>=0.6.1,<0.7.0)",
