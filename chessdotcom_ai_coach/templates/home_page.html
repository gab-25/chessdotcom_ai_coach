{% extends "index.html" %} {% block content %}
<div class="mb-6 flex items-center gap-4">
  <md-filled-button
    hx-get="/current-games"
    hx-target="#games-container"
    hx-indicator="#loading"
  >
    Refresh Games
    <md-icon slot="icon">refresh</md-icon>
  </md-filled-button>

  <md-linear-progress
    id="loading"
    class="htmx-indicator flex-1"
    indeterminate
    style="max-width: 200px"
  ></md-linear-progress>
</div>

<div
  id="games-container"
  hx-get="/current-games"
  hx-trigger="load"
  class="grid gap-4"
>
  <!-- Content will be loaded here via HTMX -->
  <div class="flex items-center justify-center p-12">
    <p class="text-gray-500 animate-pulse">Loading ongoing games...</p>
  </div>
</div>
{% endblock %}
