{% extends "index.html" %} {% block content %}
<div class="flex justify-center items-center min-h-[60vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold text-center justify-center mb-6">
        <i class="fa-solid fa-right-to-bracket text-success mr-2"></i>
        Login
      </h2>

      {% if error %}
      <div class="alert alert-error mb-4">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form action="/login" method="POST" class="space-y-4">
        <div class="form-control">
          <label class="label">
            <span class="label-text">Username</span>
          </label>
          <div class="input input-bordered flex w-full items-center gap-2">
            <i class="fa-solid fa-user text-base-content/50"></i>
            <input
              type="text"
              name="username"
              class="grow"
              placeholder="Admin"
              required
            />
          </div>
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text">Password</span>
          </label>
          <div class="input input-bordered flex w-full items-center gap-2">
            <i class="fa-solid fa-lock text-base-content/50"></i>
            <input
              type="password"
              name="password"
              class="grow"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <div class="form-control mt-6">
          <button type="submit" class="btn btn-success btn-block">Login</button>
        </div>
      </form>

      <div class="divider">OR</div>

      <div class="text-center text-sm text-base-content/70">
        Default credentials are: <br />
        <code class="bg-base-300 px-1 rounded">admin</code> /
        <code class="bg-base-300 px-1 rounded">password123</code>
      </div>
    </div>
  </div>
</div>
{% endblock %}
