{% extends "index.html" %} {% block content %}
<div class="flex justify-center items-center min-h-[60vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold justify-center mb-6">
        <i class="fa-solid fa-user-gear text-success mr-2"></i>
        Profilo
      </h2>

      {% if success %}
      <div class="alert alert-success mb-4">
        <i class="fa-solid fa-circle-check"></i>
        <span>Profilo aggiornato.</span>
      </div>
      {% endif %}

      {% if error %}
      <div class="alert alert-error mb-4">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form action="/profile" method="POST" class="space-y-4">
        <div class="form-control">
          <label class="label">
            <span class="label-text">Display Name</span>
          </label>
          <div class="input input-bordered flex w-full items-center gap-2">
            <i class="fa-solid fa-id-card text-base-content/50"></i>
            <input
              type="text"
              name="display_name"
              class="grow"
              placeholder="Il tuo nome"
              value="{{ display_name or '' }}"
              required
            />
          </div>
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text">Username Chess.com</span>
          </label>
          <div class="input input-bordered flex w-full items-center gap-2">
            <i class="fa-solid fa-chess text-base-content/50"></i>
            <input
              type="text"
              name="chessdotcom_username"
              class="grow"
              placeholder="il_tuo_username"
              value="{{ chessdotcom_username or '' }}"
              required
            />
          </div>
        </div>

        <div class="form-control mt-6">
          <button type="submit" class="btn btn-success btn-block">
            Salva
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
