{% extends "chessdotcom_ai_coach/base.html" %}
{% block title %}Something went wrong · Chess Coach AI{% endblock %}
{% block content %}
<div class="auth">
  <div class="card" style="max-width: 520px; width: 100%">
    <div class="card__body">
      <h3 class="card__title"><i class="fa-solid fa-triangle-exclamation"></i> Something went wrong</h3>
      <p style="color: var(--ink-dim); margin: 0 0 20px">
        We couldn't reach Chess.com just now.
      </p>
      <div class="alert alert--danger" style="margin-bottom: 20px">{{ message }}</div>
      <a href="/" class="btn btn--ghost"><i class="fa-solid fa-arrow-left"></i> Back to games</a>
    </div>
  </div>
</div>
{% endblock %}
