<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chessdotcom AI Coach</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <!-- Tailwind & DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts & FontAwesome -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body class="bg-base-300 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <header class="navbar bg-base-100 rounded-box shadow-lg mb-8 px-6">
        <div class="flex-1">
          <a
            href="/"
            class="flex items-center gap-3 hover:opacity-80 transition-opacity"
          >
            <img
              src="/static/img/logo.png"
              alt="Logo"
              class="h-10 w-10 object-contain rounded-lg"
            />
            <span class="text-2xl font-bold text-success tracking-tight">
              Chess Coach AI
            </span>
          </a>
        </div>
        <div class="flex-none gap-2">
          <div class="badge badge-outline badge-lg gap-2 py-4 px-4">
            <i class="fa-solid fa-user text-xs"></i>
            <span class="font-medium text-sm">{{ username }}</span>
          </div>
        </div>
      </header>

      <main>{% block content %}{% endblock %}</main>

      <footer class="mt-12 py-6 text-center text-base-content/40 text-sm">
        <p>&copy; 2026 Chessdotcom AI Coach - Powered by Gemini</p>
      </footer>
    </div>
  </body>
</html>
