services:
  chessdotcom-ai-coach:
    build: .
    env_file:
      - .env
    environment:
      - CHESS_ENGINE_HOST=chess-engine
      - CHESS_ENGINE_PORT=3333
    ports:
      - "8000:8000"
    depends_on:
      - chess-engine
      - postgres
      - ollama

  chess-engine:
    build:
      context: chess_engine
    ports:
      - "3333:3333"

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data/

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  ollama-data:
